<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BCA Token - Auto Scanner Ultra</title>
  <style>
    * { box-sizing: border-box; touch-action: manipulation; }
    body {
      margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0b1118; color: #fff; text-align: center;
      overflow: hidden; /* Mencegah scroll saat scan */
    }
    
    /* Fullscreen Video Background */
    .video-background {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; background: #000;
    }
    video { width: 100%; height: 100%; object-fit: cover; }

    /* Overlay Bidikan */
    .scan-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none; z-index: 1;
    }
    .reticle {
      width: 80%; height: 70px; /* Area bidik angka */
      border: 3px solid #53f3c3; border-radius: 12px;
      box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); /* Gelapkan luar kotak */
      position: relative;
    }
    .reticle-label {
      position: absolute; top: -25px; left: 0; width: 100%;
      color: #53f3c3; font-size: 11px; font-weight: bold; letter-spacing: 1px;
    }

    /* Panel Hasil di Bawah */
    .result-panel {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: rgba(22, 28, 39, 0.95);
      border-top: 2px solid #243041;
      border-radius: 20px 20px 0 0;
      padding: 15px 20px 30px 20px;
      z-index: 2; transition: transform 0.3s;
    }
    #tokenOutput {
      font-size: 55px; font-weight: 800; color: #53f3c3;
      letter-spacing: 6px; margin: 5px 0; font-family: monospace;
      text-shadow: 0 0 10px rgba(83, 243, 195, 0.5);
    }
    .status-text { font-size: 14px; color: #b8c2cf; min-height: 1.5em; }

    /* Preview Gambar Tajam (Seperti permintaan Anda) */
    .preview-container {
      margin-top: 10px; border-top: 1px solid #333; padding-top: 10px;
    }
    #previewCanvas {
      display: block; margin: 0 auto;
      max-width: 100%; height: 50px; /* Pendek saja untuk review */
      border: 1px solid #53f3c3; border-radius: 4px;
      /* filter: grayscale(1); // Visual saja agar terlihat 'pro' */
    }

    /* Tombol Kontrol Kecil */
    .controls { display: flex; gap: 10px; margin-top: 15px; }
    button {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s;
    }
    .btn-start { background: #53f3c3; color: #082019; }
    .btn-stop { background: #263244; color: #fff; opacity: 0.7; }
    button:active { transform: scale(0.97); }

  </style>
</head>
<body>

<div class="video-background">
  <video id="video" autoplay playsinline muted></video>
</div>

<div class="scan-overlay">
  <div class="reticle">
    <div class="reticle-label">TEMPATKAN ANGKA TOKEN</div>
  </div>
</div>

<div class="result-panel">
  <div style="font-size: 12px; color: #8fa0b5; letter-spacing: 1px;">AUTO-DETECTED TOKEN</div>
  <div id="tokenOutput">------</div>
  <div class="status-text" id="statusLabel">Kamera Standby</div>

  <div class="preview-container">
    <canvas id="previewCanvas"></canvas>
  </div>

  <div class="controls">
    <button class="btn-start" id="btnStart">MULAI SCAN</button>
    <button class="btn-stop" id="btnStop">STOP</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
  // --- KONFIGURASI PRO ---
  const CONFIG = {
    // GANTI DENGAN URL GAS ANDA YANG BARU (AKHIRAN /exec)
    gasUrl: "https://script.google.com/macros/s/AKfycbyBz-zQapdFxePExHItSlbuk83fASmvlQFvXr4xnyG0WcAmMIiYQee1brq3QstFnUkN/exec",
    scanInterval: 1200,    // Jeda antar scan (ms) - dipercepat
    threshold: 120,       // Sensitivitas kontras (0-255). Coba 110-130.
    upscale: 4            // Perbesaran gambar untuk OCR (sangat penting untuk ketajaman)
  };

  const video = document.getElementById('video');
  const previewCanvas = document.getElementById('previewCanvas');
  const tokenOutput = document.getElementById('tokenOutput');
  const statusLabel = document.getElementById('statusLabel');
  
  let streamRef = null;
  let timer = null;
  let isProcessing = false;
  let lastSentToken = "";
  letocrWorker = null;

  // 1. Inisialisasi Tesseract Worker sekali saja (lebih cepat)
  async function initOCR() {
    statusLabel.textContent = "Memuat AI Reader...";
    ocrWorker = await Tesseract.createWorker('eng');
    await ocrWorker.setParameters({
      tessedit_char_whitelist: '0123456789',
      tessedit_pageseg_mode: '7', // Perlakukan sebagai satu baris teks tunggal
    });
    statusLabel.textContent = "AI Siap.";
  }

  // 2. Mulai Kamera
  async function startCamera() {
    if(!ocrWorker) await initOCR();

    try {
      statusLabel.textContent = "Membuka kamera...";
      streamRef = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment",
          width: { ideal: 1920 }, // Resolusi tinggi
          height: { ideal: 1080 }
        }
      });
      video.srcObject = streamRef;
      
      video.onloadedmetadata = () => {
        statusLabel.textContent = "Auto-Scanning Aktif...";
        // Mulai Loop Scan Otomatis
        timer = setInterval(captureAndScan, CONFIG.scanInterval);
      };
    } catch (err) {
      statusLabel.textContent = "Kamera Error: " + err.message;
    }
  }

  function stopCamera() {
    clearInterval(timer);
    if (streamRef) streamRef.getTracks().forEach(t => t.stop());
    video.srcObject = null;
    statusLabel.textContent = "Scanner Dimatikan.";
    tokenOutput.textContent = "------";
  }

  // 3. Pemrosesan Gambar Jernih & Tajam (Seperti permintaan Anda)
  function processImage(sourceCanvas) {
    const ctx = previewCanvas.getContext('2d', { willReadFrequently: true });
    
    // Hitung area crop sesuai reticle (kotak hijau)
    const vw = sourceCanvas.width;
    const vh = sourceCanvas.height;

    // Crop area tengah yang sempit (hanya baris angka)
    const cropW = vw * 0.7; 
    const cropH = vh * 0.10; // Sangat sempit agar fokus di angka
    const cropX = (vw - cropW) / 2;
    const cropY = (vh - cropH) / 2;

    // Set ukuran canvas preview dengan upscale tinggi
    previewCanvas.width = cropW * CONFIG.upscale;
    previewCanvas.height = cropH * CONFIG.upscale;

    // Gambar ke canvas preview (Upscale)
    ctx.imageSmoothingEnabled = false; // Matikan smoothing agar pixel tajam
    ctx.drawImage(sourceCanvas, cropX, cropY, cropW, cropH, 0, 0, previewCanvas.width, previewCanvas.height);

    // --- BINARIZATION (Ubah jadi Hitam Putih Tajam seperti gambar 2) ---
    const imgData = ctx.getImageData(0, 0, previewCanvas.width, previewCanvas.height);
    const data = imgData.data;

    for (let i = 0; i < data.length; i += 4) {
      // Rumus Grayscale Luma (lebih akurat untuk mata)
      const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
      
      // Thresholding: Jika terang jadi putih, jika gelap jadi hitam pekat
      const v = gray > CONFIG.threshold ? 255 : 0;
      
      data[i] = data[i+1] = data[i+2] = v;
      // data[i+3] (alpha) tetap 255
    }
    ctx.putImageData(imgData, 0, 0);
  }

  // 4. Loop Scan Otomatis
  async function captureAndScan() {
    if (isProcessing || !video.videoWidth || !ocrWorker) return;
    isProcessing = true;

    // Buat temporary canvas untuk grab frame asli
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;
    tempCanvas.getContext('2d').drawImage(video, 0, 0);

    // Olah gambar agar tajam (Hitam Putih Kontras Tinggi)
    processImage(tempCanvas);

    try {
      // Jalankan OCR pada gambar tajam
      const { data: { text } } = await ocrWorker.recognize(previewCanvas);

      // Bersihkan hasil: ambil 6 digit pertama
      const cleanDigits = text.replace(/\D/g, '').substring(0, 6);

      if (cleanDigits.length === 6) {
        tokenOutput.textContent = cleanDigits;
        
        // Hanya kirim jika token berbeda dari yang terakhir dikirim
        if (cleanDigits !== lastSentToken) {
          sendToSheets(cleanDigits);
        } else {
          statusLabel.textContent = "Token sama (skip sending)";
        }
      } else {
        // statusLabel.textContent = "Mencari angka..."; // Jangan terlalu sering update status agar tidak lag
      }
    } catch (e) {
      console.error("OCR Error:", e);
    } finally {
      isProcessing = false;
    }
  }

  // 5. Kirim ke Google Sheets
  async function sendToSheets(token) {
    statusLabel.textContent = "Mengirim " + token + "...";
    try {
      // Menggunakan mode: 'no-cors' agar tidak terblokir browser, 
      // tapi kita tidak bisa baca respon sukses/gagal dari GAS.
      await fetch(CONFIG.gasUrl, {
        method: "POST",
        mode: "no-cors", 
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "token=" + token
      });
      
      lastSentToken = token;
      statusLabel.textContent = "✅ BERHASIL DIKIRIM: " + token;
      
      // Feedback Getar (HP)
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      
    } catch (err) {
      statusLabel.textContent = "❌ Gagal kirim. Cek koneksi/URL GAS.";
    }
  }

  document.getElementById('btnStart').addEventListener('click', startCamera);
  document.getElementById('btnStop').addEventListener('click', stopCamera);

  // Auto-start OCR worker saat halaman dimuat
  initOCR();

</script>
</body>
</html>
