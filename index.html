<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Token BCA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #fff;
      text-align: center;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      margin: 8px 0;
      font-size: 24px;
    }
    p {
      color: #b8c2cf;
      margin: 0 0 12px;
    }
    .video-wrap {
      position: relative;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #263244;
      background: #111;
    }
    video {
      width: 100%;
      display: block;
      background: #111;
    }
    .scan-box {
      position: absolute;
      left: 20%;
      top: 38%;
      width: 60%;
      height: 14%;
      border: 3px solid #53f3c3;
      border-radius: 12px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.30);
      pointer-events: none;
    }
    .panel {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: #111826;
      border: 1px solid #243041;
    }
    .token {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #53f3c3;
      margin: 10px 0;
    }
    .status {
      min-height: 22px;
      color: #d0d7e2;
      font-size: 14px;
    }
    .btns {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    .primary {
      background: #53f3c3;
      color: #082019;
      font-weight: 700;
    }
    .secondary {
      background: #263244;
      color: #fff;
    }
    canvas {
      display: none;
    }
    .hint {
      margin-top: 8px;
      color: #8fa0b5;
      font-size: 13px;
      line-height: 1.5;
    }
    .preview {
      margin-top: 12px;
    }
    #debugCanvas {
      width: 100%;
      max-width: 500px;
      border: 1px solid #263244;
      border-radius: 12px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Scan Token BCA</h1>
    <p>Posisikan angka token tepat di dalam kotak hijau.</p>

    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="scan-box"></div>
    </div>

    <canvas id="workCanvas"></canvas>
    <canvas id="debugCanvas"></canvas>

    <div class="panel">
      <div>Hasil token</div>
      <div class="token" id="tokenText">------</div>
      <div class="status" id="statusText">Belum aktif</div>

      <div class="btns">
        <button class="primary" id="startBtn">Aktifkan Kamera</button>
        <button class="secondary" id="stopBtn">Stop</button>
      </div>

      <div class="hint">
        Taruh token di kotak hijau, dekatkan 10–15 cm, hindari pantulan cahaya, dan usahakan hanya angka yang terlihat.
      </div>

      <div class="preview">
        <div style="margin-bottom:8px;color:#b8c2cf;">Preview OCR</div>
        <canvas id="previewCanvas"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyBz-zQapdFxePExHItSlbuk83fASmvlQFvXr4xnyG0WcAmMIiYQee1brq3QstFnUkN/exec";

    const video = document.getElementById("video");
    const workCanvas = document.getElementById("workCanvas");
    const debugCanvas = document.getElementById("debugCanvas");
    const previewCanvas = document.getElementById("previewCanvas");

    const tokenText = document.getElementById("tokenText");
    const statusText = document.getElementById("statusText");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    let streamRef = null;
    let scanTimer = null;
    let isBusy = false;
    let lastToken = "";
    let lastSentAt = 0;

    async function startCamera() {
      try {
        statusText.textContent = "Meminta izin kamera...";

        streamRef = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        video.srcObject = streamRef;
        await video.play();

        statusText.textContent = "Kamera aktif. Arahkan token ke kotak hijau.";
        clearInterval(scanTimer);
        scanTimer = setInterval(scanLoop, 1800);
      } catch (err) {
        statusText.textContent = "Gagal akses kamera: " + err.message;
        console.error(err);
      }
    }

    function stopCamera() {
      clearInterval(scanTimer);
      scanTimer = null;

      if (streamRef) {
        streamRef.getTracks().forEach(track => track.stop());
        streamRef = null;
      }

      video.srcObject = null;
      statusText.textContent = "Kamera dihentikan.";
    }

    function preprocessImage(srcCanvas, dstCanvas) {
      const sctx = srcCanvas.getContext("2d");
      const dctx = dstCanvas.getContext("2d");

      const sw = srcCanvas.width;
      const sh = srcCanvas.height;

      // upscale 2x biar angka lebih besar
      dstCanvas.width = sw * 2;
      dstCanvas.height = sh * 2;

      dctx.drawImage(srcCanvas, 0, 0, dstCanvas.width, dstCanvas.height);

      const img = dctx.getImageData(0, 0, dstCanvas.width, dstCanvas.height);
      const data = img.data;

      // grayscale + threshold
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];

        const gray = 0.299 * r + 0.587 * g + 0.114 * b;

        // threshold
        const v = gray > 140 ? 255 : 0;

        data[i] = v;
        data[i + 1] = v;
        data[i + 2] = v;
      }

      dctx.putImageData(img, 0, 0);
    }

    async function scanLoop() {
      if (isBusy) return;
      if (!video.videoWidth || !video.videoHeight) return;

      isBusy = true;

      try {
        const vw = video.videoWidth;
        const vh = video.videoHeight;

        // area sesuai kotak hijau
        const cropX = Math.floor(vw * 0.20);
        const cropY = Math.floor(vh * 0.38);
        const cropW = Math.floor(vw * 0.60);
        const cropH = Math.floor(vh * 0.14);

        workCanvas.width = cropW;
        workCanvas.height = cropH;

        const wctx = workCanvas.getContext("2d");
        wctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

        preprocessImage(workCanvas, previewCanvas);

        const result = await Tesseract.recognize(previewCanvas, "eng", {
          tessedit_char_whitelist: "0123456789",
          preserve_interword_spaces: "0"
        });

        const rawText = (result.data.text || "").trim();
        const digits = rawText.replace(/\D/g, "");

        if (digits.length >= 6) {
          const token = digits.substring(0, 6);
          tokenText.textContent = token;

          const now = Date.now();
          const sameRecent = token === lastToken && (now - lastSentAt < 10000);

          if (!sameRecent) {
            statusText.textContent = "Mengirim token " + token + "...";

            const body = new URLSearchParams({ token }).toString();

            const res = await fetch(GAS_URL, {
              method: "POST",
              headers: {
                "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
              },
              body
            });

            const json = await res.json().catch(() => ({}));

            if (json.ok) {
              lastToken = token;
              lastSentAt = now;
              statusText.textContent = "Tersimpan: " + token;
            } else {
              statusText.textContent = "Gagal simpan: " + (json.message || "Unknown error");
            }
          } else {
            statusText.textContent = "Token sama, diabaikan.";
          }
        } else {
          tokenText.textContent = "------";
          statusText.textContent = "Token belum terbaca";
        }
      } catch (err) {
        statusText.textContent = "Error scan: " + err.message;
        console.error(err);
      }

      isBusy = false;
    }

    startBtn.addEventListener("click", startCamera);
    stopBtn.addEventListener("click", stopCamera);
  </script>
</body>
</html>
