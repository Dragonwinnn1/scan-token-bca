<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BCA Token - Snap Reader</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: sans-serif;
      background: #0b1118; color: #fff; text-align: center;
    }
    .container { max-width: 500px; margin: 0 auto; padding: 20px; }
    h2 { color: #53f3c3; margin-bottom: 5px; }
    
    .camera-box {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1; /* Kotak agar lebih fokus ke area token */
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid #243041;
    }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    /* Overlay Garis Bidik */
    .reticle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 80%; height: 60px;
      border: 2px dashed #53f3c3;
      border-radius: 8px;
      box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
    }
    .reticle::after {
      content: "TEMPATKAN ANGKA DI SINI";
      font-size: 10px; color: #53f3c3; letter-spacing: 1px;
    }

    .result-section {
      margin-top: 20px; padding: 15px;
      background: #161c27; border-radius: 15px;
    }
    #tokenValue {
      font-size: 50px; font-weight: bold; color: #53f3c3;
      margin: 10px 0; letter-spacing: 5px;
    }
    
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
    button {
      padding: 15px; border: none; border-radius: 12px;
      font-weight: bold; cursor: pointer; font-size: 14px;
    }
    .btn-snap { background: #53f3c3; color: #082019; grid-column: span 2; font-size: 18px; }
    .btn-cam { background: #263244; color: #fff; }
    
    #previewCanvas {
      width: 100%; margin-top: 15px; border-radius: 10px;
      border: 1px solid #333; display: none;
    }
    .status { font-size: 13px; color: #8fa0b5; margin-top: 10px; min-height: 1.5em; }
    
    /* Animasi saat memproses */
    .loading { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>

<div class="container" id="mainApp">
  <h2>Token Reader</h2>
  <p style="font-size: 12px; color: #8fa0b5;">Arahkan, pastikan fokus, lalu klik Ambil Foto</p>

  <div class="camera-box">
    <video id="video" autoplay playsinline muted></video>
    <div class="reticle"></div>
  </div>

  <div class="result-section">
    <div id="tokenValue">------</div>
    <div class="status" id="statusMsg">Kamera Standby</div>

    <canvas id="previewCanvas"></canvas>

    <div class="controls">
      <button class="btn-snap" id="btnSnap">📸 AMBIL FOTO TOKEN</button>
      <button class="btn-cam" id="btnToggle">BUKA KAMERA</button>
      <button class="btn-cam" style="background:#442626;" onclick="location.reload()">RELOAD</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('previewCanvas');
  const tokenValue = document.getElementById('tokenValue');
  const statusMsg = document.getElementById('statusMsg');
  const btnSnap = document.getElementById('btnSnap');
  const mainApp = document.getElementById('mainApp');

  const GAS_URL = "https://script.google.com/macros/s/AKfycbyBz-zQapdFxePExHItSlbuk83fASmvlQFvXr4xnyG0WcAmMIiYQee1brq3QstFnUkN/exec";
  let streamRef = null;

  // 1. Mulai Kamera
  async function startCamera() {
    try {
      statusMsg.textContent = "Menghubungkan kamera...";
      streamRef = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
      });
      video.srcObject = streamRef;
      statusMsg.textContent = "Kamera Siap.";
    } catch (err) {
      statusMsg.textContent = "Gagal akses kamera: " + err.message;
    }
  }

  // 2. Ambil Foto & Olah Gambar
  async function takeSnap() {
    if (!streamRef) return alert("Buka kamera dulu!");

    mainApp.classList.add('loading');
    statusMsg.textContent = "Mengambil gambar & memproses...";
    tokenValue.textContent = "......";

    const ctx = canvas.getContext('2d');
    
    // Ukuran asli video
    const vw = video.videoWidth;
    const vh = video.videoHeight;

    // Hitung area crop (sesuai kotak reticle)
    const cropW = vw * 0.8;
    const cropH = vh * 0.15; // Area baris angka saja
    const cropX = (vw - cropW) / 2;
    const cropY = (vh - cropH) / 2;

    // Perbesar hasil crop agar Tesseract mudah baca (Upscale 4x)
    canvas.width = cropW * 4;
    canvas.height = cropH * 4;
    ctx.imageSmoothingEnabled = false;
    
    // Gambar ke canvas
    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);

    // Binarization (Hitam Putih Tajam)
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const pixels = imgData.data;
    for (let i = 0; i < pixels.length; i += 4) {
      const avg = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
      const v = avg > 115 ? 255 : 0; // Atur 115 jika kurang kontras
      pixels[i] = pixels[i+1] = pixels[i+2] = v;
    }
    ctx.putImageData(imgData, 0, 0);
    
    canvas.style.display = "block"; // Tampilkan hasil foto yang diproses

    runOCR();
  }

  // 3. Jalankan OCR
  async function runOCR() {
    try {
      const result = await Tesseract.recognize(canvas, 'eng', {
        tessedit_char_whitelist: '0123456789',
        tessedit_pageseg_mode: '7'
      });

      const digits = result.data.text.replace(/\D/g, '').substring(0, 6);

      if (digits.length === 6) {
        tokenValue.textContent = digits;
        sendData(digits);
      } else {
        tokenValue.textContent = "FAIL";
        statusMsg.textContent = "Angka kurang jelas, coba lagi.";
        mainApp.classList.remove('loading');
      }
    } catch (e) {
      statusMsg.textContent = "OCR Error.";
      mainApp.classList.remove('loading');
    }
  }

  // 4. Kirim ke Google Sheets
  async function sendData(token) {
    statusMsg.textContent = "Mengirim " + token + "...";
    try {
      await fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "token=" + token
      });
      statusMsg.textContent = "BERHASIL DIKIRIM!";
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    } catch (err) {
      statusMsg.textContent = "Gagal kirim ke Sheets.";
    }
    mainApp.classList.remove('loading');
  }

  btnToggle.addEventListener('click', startCamera);
  btnSnap.addEventListener('click', takeSnap);
</script>

</body>
</html>
