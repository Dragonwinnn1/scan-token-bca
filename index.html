<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ultra Fast Token Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #000; font-family: sans-serif; color: #fff; overflow: hidden; }
    
    /* Full Camera View */
    .camera-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    video { width: 100%; height: 100%; object-fit: cover; }

    /* Scanner UI Overlay */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .scan-window {
      width: 85%; height: 80px; border: 2px solid #00ffcc; border-radius: 12px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.7); position: relative;
    }
    .scan-window::before {
      content: "ARAHKAN KE ANGKA"; position: absolute; top: -30px; left: 0; width: 100%;
      text-align: center; color: #00ffcc; font-size: 12px; font-weight: bold; letter-spacing: 2px;
    }

    /* Bottom Status Panel */
    .bottom-panel {
      position: fixed; bottom: 0; left: 0; width: 100%; z-index: 3;
      background: linear-gradient(transparent, #111 20%); padding: 20px;
    }
    .token-box {
      font-size: 60px; font-weight: 900; color: #00ffcc; font-family: 'Courier New', monospace;
      text-shadow: 0 0 15px rgba(0,255,204,0.5); margin-bottom: 10px;
    }
    .status { font-size: 14px; color: #aaa; margin-bottom: 15px; }
    
    /* Preview Gambar untuk Cek Akurasi */
    #preview {
      width: 100%; height: 60px; border: 1px solid #333; background: #000;
      object-fit: contain; margin-bottom: 15px; display: block;
    }

    .btn {
      width: 100%; padding: 18px; border-radius: 12px; border: none;
      font-size: 16px; font-weight: bold; cursor: pointer; pointer-events: auto;
    }
    .btn-start { background: #00ffcc; color: #000; }
    .btn-stop { background: #333; color: #fff; margin-top: 10px; display: none; }
  </style>
</head>
<body>

<div class="camera-container">
  <video id="video" autoplay playsinline muted></video>
</div>

<div class="overlay">
  <div class="scan-window"></div>
</div>

<div class="bottom-panel">
  <div class="token-box" id="outToken">------</div>
  <div class="status" id="outStatus">Siap memindai...</div>
  
  <canvas id="preview"></canvas>

  <button class="btn btn-start" id="btnStart">MULAI SCAN OTOMATIS</button>
  <button class="btn btn-stop" id="btnStop">BERHENTI</button>
</div>

<script>
  const CONFIG = {
    gasUrl: "https://script.google.com/macros/s/AKfycbyBz-zQapdFxePExHItSlbuk83fASmvlQFvXr4xnyG0WcAmMIiYQee1brq3QstFnUkN/exec",
    zoom: 4,         // Perbesaran gambar
    threshold: 110   // Jika angka 8 terbaca 5, turunkan angka ini (misal ke 100)
  };

  const video = document.getElementById('video');
  const preview = document.getElementById('preview');
  const outToken = document.getElementById('outToken');
  const outStatus = document.getElementById('outStatus');
  const btnStart = document.getElementById('btnStart');
  const btnStop = document.getElementById('btnStop');

  let worker = null;
  let isActive = false;
  let lastSent = "";

  async function initWorker() {
    outStatus.textContent = "Menginisialisasi Mesin AI...";
    worker = await Tesseract.createWorker('eng');
    await worker.setParameters({
      tessedit_char_whitelist: '0123456789',
      tessedit_pageseg_mode: '7', // Fokus pada 1 baris teks
    });
    outStatus.textContent = "AI Siap!";
  }

  async function startScan() {
    if (!worker) await initWorker();
    
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: 1280, height: 720 }
      });
      video.srcObject = stream;
      isActive = true;
      btnStart.style.display = "none";
      btnStop.style.display = "block";
      scanLoop();
    } catch (e) {
      alert("Kamera error: " + e.message);
    }
  }

  function stopScan() {
    isActive = false;
    if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    btnStart.style.display = "block";
    btnStop.style.display = "none";
    outStatus.textContent = "Scanner berhenti.";
  }

  async function scanLoop() {
    if (!isActive) return;

    const ctx = preview.getContext('2d', { willReadFrequently: true });
    const vw = video.videoWidth;
    const vh = video.videoHeight;

    if (vw > 0) {
      // Crop area sesuai jendela hijau
      const cw = vw * 0.7;
      const ch = vh * 0.12;
      const cx = (vw - cw) / 2;
      const cy = (vh - ch) / 2;

      preview.width = cw * CONFIG.zoom;
      preview.height = ch * CONFIG.zoom;

      // 1. Ambil Gambar & Upscale
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(video, cx, cy, cw, ch, 0, 0, preview.width, preview.height);

      // 2. Pemrosesan Pixel (Binarization Tinggi)
      const imgData = ctx.getImageData(0, 0, preview.width, preview.height);
      const data = imgData.data;

      for (let i = 0; i < data.length; i += 4) {
        // Luma grayscale
        const v = (0.21 * data[i] + 0.72 * data[i+1] + 0.07 * data[i+2]) > CONFIG.threshold ? 255 : 0;
        data[i] = data[i+1] = data[i+2] = v;
      }
      ctx.putImageData(imgData, 0, 0);

      // 3. Jalankan OCR
      try {
        const { data: { text } } = await worker.recognize(preview);
        const digits = text.replace(/\D/g, "").substring(0, 8); // Ambil sampai 8 digit

        if (digits.length >= 6) {
          outToken.textContent = digits;
          if (digits !== lastSent) {
            sendData(digits);
          }
        }
      } catch (err) { console.log(err); }
    }

    // Loop terus menerus secepat mungkin
    setTimeout(scanLoop, 500);
  }

  async function sendData(token) {
    outStatus.textContent = "Mengirim " + token + "...";
    try {
      await fetch(CONFIG.gasUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "token=" + token
      });
      lastSent = token;
      outStatus.textContent = "✅ TERKIRIM!";
      if (navigator.vibrate) navigator.vibrate(200);
    } catch (e) {
      outStatus.textContent = "Gagal kirim ke Sheets.";
    }
  }

  btnStart.addEventListener('click', startScan);
  btnStop.addEventListener('click', stopScan);
</script>

</body>
</html>
