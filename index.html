<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BCA Token Scanner Pro</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0b0f14;
      color: #fff;
      text-align: center;
    }
    .wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 { font-size: 22px; margin-bottom: 5px; color: #53f3c3; }
    p { color: #8fa0b5; font-size: 14px; margin-top: 0; }

    .video-container {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid #263244;
      background: #000;
      aspect-ratio: 4/3;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* Overlay Kotak Scan */
    .scan-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      pointer-events: none;
    }
    .scan-guide {
      width: 70%;
      height: 15%;
      border: 3px solid #53f3c3;
      border-radius: 10px;
      box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .scan-guide::after {
      content: "POSISIKAN ANGKA DI SINI";
      position: absolute;
      top: -25px;
      left: 0;
      width: 100%;
      font-size: 10px;
      font-weight: bold;
      color: #53f3c3;
    }

    .result-panel {
      margin-top: 20px;
      padding: 20px;
      background: #161c27;
      border-radius: 15px;
      border: 1px solid #243041;
    }
    .token-display {
      font-size: 48px;
      font-weight: 800;
      color: #53f3c3;
      letter-spacing: 8px;
      margin: 10px 0;
      font-family: monospace;
    }
    .status-msg {
      font-size: 13px;
      color: #b8c2cf;
      min-height: 18px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-start { background: #53f3c3; color: #082019; }
    .btn-stop { background: #263244; color: #fff; }
    
    /* Debug Canvas: Menyembunyikan canvas asli, tapi menampilkan preview kecil */
    canvas { display: none; }
    .preview-box {
      margin-top: 15px;
      border-top: 1px solid #243041;
      padding-top: 10px;
    }
    #previewCanvas {
      display: block;
      margin: 10px auto;
      max-width: 100%;
      height: auto;
      border: 1px solid #53f3c3;
      filter: grayscale(1); /* Tampilan visual saja */
    }
  </style>
</head>
<body>

<div class="wrap">
  <h1>BCA Token Scanner</h1>
  <p>Otomatis deteksi & kirim ke Google Sheets</p>

  <div class="video-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-overlay">
      <div class="scan-guide"></div>
    </div>
  </div>

  <div class="result-panel">
    <div style="font-size: 12px; color: #8fa0b5;">HASIL SCAN TERAKHIR</div>
    <div class="token-display" id="tokenOutput">------</div>
    <div class="status-msg" id="statusLabel">Kamera belum aktif</div>

    <div class="btn-group">
      <button class="btn-start" id="btnStart">MULAI SCAN</button>
      <button class="btn-stop" id="btnStop">STOP</button>
    </div>

    <div class="preview-box">
      <div style="font-size: 11px; color: #53f3c3;">PREVIEW OCR (Binary)</div>
      <canvas id="previewCanvas"></canvas>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
  // --- KONFIGURASI ---
  const CONFIG = {
    gasUrl: "https://script.google.com/macros/s/AKfycbyBz-zQapdFxePExHItSlbuk83fASmvlQFvXr4xnyG0WcAmMIiYQee1brq3QstFnUkN/exec",
    scanInterval: 1500, // Kecepatan scan (ms)
    thresholdValue: 125, // Sensitivitas cahaya (0-255)
    upscale: 3 // Perbesaran gambar untuk OCR
  };

  const video = document.getElementById('video');
  const previewCanvas = document.getElementById('previewCanvas');
  const tokenOutput = document.getElementById('tokenOutput');
  const statusLabel = document.getElementById('statusLabel');
  
  let streamRef = null;
  let timer = null;
  let isProcessing = false;
  let lastToken = "";

  async function initCamera() {
    try {
      statusLabel.textContent = "Membuka kamera...";
      streamRef = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment",
          width: { ideal: 1280 },
          height: { ideal: 720 },
          focusMode: "continuous" // Jika didukung browser
        }
      });
      video.srcObject = streamRef;
      statusLabel.textContent = "Mencari angka token...";
      
      // Tunggu video ready
      video.onloadedmetadata = () => {
        timer = setInterval(captureAndScan, CONFIG.scanInterval);
      };
    } catch (err) {
      statusLabel.textContent = "Error: " + err.message;
    }
  }

  function stopCamera() {
    clearInterval(timer);
    if (streamRef) {
      streamRef.getTracks().forEach(t => t.stop());
    }
    video.srcObject = null;
    statusLabel.textContent = "Kamera dimatikan";
  }

  function processImage(sourceCanvas) {
    const ctx = previewCanvas.getContext('2d', { willReadFrequently: true });
    
    // Set ukuran preview berdasarkan kotak guide (kira-kira)
    const sw = sourceCanvas.width * 0.7; 
    const sh = sourceCanvas.height * 0.15;
    const sx = (sourceCanvas.width - sw) / 2;
    const sy = (sourceCanvas.height - sh) / 2;

    previewCanvas.width = sw * CONFIG.upscale;
    previewCanvas.height = sh * CONFIG.upscale;

    // Gambar ke canvas preview dengan upscale
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(sourceCanvas, sx, sy, sw, sh, 0, 0, previewCanvas.width, previewCanvas.height);

    // Manipulasi Pixel (Binarization)
    const imgData = ctx.getImageData(0, 0, previewCanvas.width, previewCanvas.height);
    const data = imgData.data;

    for (let i = 0; i < data.length; i += 4) {
      // Rumus Grayscale Luma
      const brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
      const v = brightness > CONFIG.thresholdValue ? 255 : 0;
      data[i] = data[i+1] = data[i+2] = v;
    }
    ctx.putImageData(imgData, 0, 0);
  }

  async function captureAndScan() {
    if (isProcessing || !video.videoWidth) return;
    isProcessing = true;

    // Buat canvas sementara untuk capture frame video
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;
    tempCanvas.getContext('2d').drawImage(video, 0, 0);

    // Proses gambar agar hitam putih tajam
    processImage(tempCanvas);

    try {
      const { data: { text } } = await Tesseract.recognize(previewCanvas, 'eng', {
        tessedit_char_whitelist: '0123456789',
        tessedit_pageseg_mode: '7' // Perlakukan sebagai satu baris teks
      });

      const cleanDigits = text.replace(/\D/g, '').substring(0, 6);

      if (cleanDigits.length === 6) {
        tokenOutput.textContent = cleanDigits;
        
        if (cleanDigits !== lastToken) {
          sendToSheets(cleanDigits);
        } else {
          statusLabel.textContent = "Token sama terdeteksi (skip)";
        }
      } else {
        statusLabel.textContent = "Mencoba membaca...";
      }
    } catch (e) {
      console.error(e);
    } finally {
      isProcessing = false;
    }
  }

  async function sendToSheets(token) {
    statusLabel.textContent = "Mengirim " + token + "...";
    try {
      const response = await fetch(CONFIG.gasUrl, {
        method: "POST",
        mode: "no-cors", // Penting untuk menghindari error CORS pada GAS
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "token=" + token
      });
      
      lastToken = token;
      statusLabel.textContent = "BERHASIL DIKIRIM: " + token;
      
      // Haptic feedback jika di HP
      if (navigator.vibrate) navigator.vibrate(100);
      
    } catch (err) {
      statusLabel.textContent = "Gagal kirim data.";
    }
  }

  document.getElementById('btnStart').addEventListener('click', initCamera);
  document.getElementById('btnStop').addEventListener('click', stopCamera);

</script>
</body>
</html>
